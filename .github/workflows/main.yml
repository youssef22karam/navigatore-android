name: Build Navigator APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # lets you trigger it manually from the GitHub UI

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:

      # 1 – Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2 – Set up Java 17 (required by Android Gradle Plugin 8.x)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3 – Download the Gradle wrapper JAR (not stored in repo to keep it small)
      - name: Download Gradle wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar || \
          curl -fsSL \
            "https://services.gradle.org/distributions/gradle-8.2-bin.zip" \
            -o /tmp/gradle.zip && \
          unzip -j /tmp/gradle.zip "*/lib/gradle-wrapper.jar" \
            -d gradle/wrapper 2>/dev/null || true
          # Fallback: use gradle to generate wrapper
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            sudo apt-get install -y gradle -q
            gradle wrapper --gradle-version 8.2
          fi

      # 4 – Cache Gradle dependencies for faster future runs
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5 – Make gradlew executable
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 6 – Fix SDK path conflict (ANDROID_HOME vs ANDROID_SDK_ROOT)
      - name: Set up local.properties with correct SDK path
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ANDROID_HOME was: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT is: $ANDROID_SDK_ROOT"
          echo "Written local.properties:"
          cat local.properties

      # 7 – Build the debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # 8 – Upload the APK as a downloadable artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Navigator-debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 9 – Print where to find it
      - name: Build success
        run: |
          echo "======================================"
          echo " APK built successfully!"
          echo " Download it from the Actions tab →"
          echo " Artifacts → Navigator-debug-APK"
          echo "======================================"
